# https://taskfile.dev

version: '3'

dotenv:
  - .env

tasks:
  dev:
    desc: "Run server in development mode"
    cmd: go run cmd/http/main.go

  db:cli:
    desc: "Access database with CLI"
    cmd: docker exec -it postgres psql -U {{ .DB_USER }} -b {{ .DB_NAME }}

  compose:up:
    desc: "Run all docker compose containers"
    cmd: docker compose up -d

  compose:down:
    desc: "Shutdown all docker compose containers"
    cmd: docker compose down
