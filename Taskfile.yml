# https://taskfile.dev

version: '3'

dotenv:
  - .env

tasks:
  compose:up:
    desc: "run all docker containers"
    cmd: docker compose up -d

  compose:down:
    desc: "shutdown docker containers"
    cmd: docker compose down

  db:cli:
    desc: "access postgres db cli"
    cmd: docker exec -it postgres psql -U {{ .DB_USER }} -b {{ .DB_NAME }}

  dev:
    desc: "run server in development mode"
    cmd: go run cmd/http/main.go
