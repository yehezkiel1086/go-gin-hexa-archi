services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    container_name: postgres
  redis:
    image: redis:8.2-alpine
    restart: always
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} # Optional: enable AOF and set a password
    container_name: redis

volumes:
  db_data:
  redis_data:
